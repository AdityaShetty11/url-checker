<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Checker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>URL Checker</h1>
    <p class="subtitle">Check whether a URL exists and what it points to.</p>

    <input
      type="text"
      id="urlInput"
      placeholder="https://example.com/some/path"
      autocomplete="off"
      spellcheck="false"
    />
    <div id="result" class="result">
      <div class="label" id="resultLabel"></div>
      <div class="message" id="resultMessage"></div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
